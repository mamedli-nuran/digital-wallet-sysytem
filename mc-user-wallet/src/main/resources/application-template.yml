server:
  port: 8082

spring:
  application:
    name: mc-user-wallet

  datasource:
    url:
    username:
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        id:
          new_generator_mappings: true

services:
  transaction-history:
    url: http://localhost:8081